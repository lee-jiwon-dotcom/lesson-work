<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Flexbox 練習</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f5f5f5;
            padding: 40px;
        }

        .card {
            background-color: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .profile-image {
            width: 80px;
            height: 80px;
            background-color: #ddd;
            border-radius: 50%;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .button {
            padding: 10px 16px;
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .button.secondary {
            background-color: #777;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-row">
            <div class="profile-image"></div>

            <div>
                <h2>イジウォン</h2>
                <p>HTMLと CSSを 勉強しています！</p>
            </div>
        </div>

        <div class="button-row">
            <a href="#" class="button">保存する</a>
            <a href="#" class="button secondary">戻る</a>
        </div>
    </div>
</body>
</html>
